stages:
  - prepare
  - codecheck
  # - testrun
variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_TAG
      when: always
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: always
    - if: $CI_COMMIT_BRANCH
      when: never

default:
  image: python:3.12
  cache: &global_cache # shared cache across all branches an all jobs
    key:
      files:
        - pyproject.toml
    paths:
      - .cache/pip
      - venv/
      - .nox/
    policy: pull-push
  before_script:
    - echo "Preparing..."
    # - export # useful for pipeline debugging
    - python -V
    - pip install virtualenv
    - virtualenv venv
    - source venv/bin/activate

prepare:
  stage: prepare
  tags:
    - srmuc01
  rules:
    - changes:
        - pyproject.toml
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - when: manual
      allow_failure: true
  script:
    - pip install build setuptools-scm nox

black-formatcheck:
  stage: codecheck
  tags:
    - srmuc01
  cache:
    <<: *global_cache
    policy: pull
  interruptible: true
  allow_failure: true
  script:
    - nox -s black

ruff-check:
  stage: codecheck
  tags:
    - srmuc01
  cache:
    <<: *global_cache
    policy: pull
  interruptible: true
  allow_failure: true
  script:
    - nox -s ruff

mypy-check:
  stage: codecheck
  tags:
    - srmuc01
  cache:
    <<: *global_cache
    policy: pull
  interruptible: true
  allow_failure: true
  script:
    - nox -s mypy

